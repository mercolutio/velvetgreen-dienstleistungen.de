name: Deploy to HostEurope

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            .claude/**
            generate-landing-pages.php
            generate-single-landing-page.sh
            import-keywords.php
            import-keywords.sql
            import-keywords-extended.sql
            n8n-workflow.json
            CLAUDE.md
            .gitignore
            contact-handler-debug.php
            emergency-debug.php
